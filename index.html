<!-- estructura inicial de interfaz -->
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Analizador FEL</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 350px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
      color: #333;
    }

    label {
      display: block;
      text-align: left;
      margin-top: 10px;
      font-weight: bold;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #2a5298;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #1e3c72;
    }

    .resultado {
      margin-top: 20px;
      padding: 15px;
      background: #f4f6f9;
      border-radius: 8px;
      font-weight: bold;
      color: #333;
      white-space: pre-line;
    }

  </style>
</head>

<body>

  <div class="card">
    <h2>📊 Analizador FEL</h2>

    <label>Fecha Desde</label>
    <input type="date" id="desde">

    <label>Fecha Hasta</label>
    <input type="date" id="hasta">

    <button onclick="seleccionarCarpeta()">📁 Seleccionar Carpeta</button>
    <p id="carpeta" style="font-size:12px; color:#555;"></p>

    <button onclick="calcular()">Calcular Totales</button>

    <div id="resultado" class="resultado"></div>
  </div>

  <script src="renderer.js"></script>

</body>
</html>
